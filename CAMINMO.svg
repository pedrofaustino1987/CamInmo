<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .navy-stroke { stroke: #0F172A; stroke-width: 12; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .cyan-stroke { stroke: #06B6D4; stroke-width: 12; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .navy-fill { fill: #0F172A; }
      .cyan-fill { fill: #06B6D4; }
      .text-cam { font-family: 'Inter', 'Montserrat', 'Segoe UI', sans-serif; font-weight: 800; font-size: 64px; fill: #0F172A; letter-spacing: -0.5px; }
      .text-inmo { font-family: 'Inter', 'Montserrat', 'Segoe UI', sans-serif; font-weight: 400; font-size: 64px; fill: #06B6D4; letter-spacing: -0.5px; }
      .text-sub { font-family: 'Inter', 'Segoe UI', sans-serif; font-weight: 600; font-size: 16px; fill: #64748B; letter-spacing: 6px; }
      .tech-line { stroke: #06B6D4; stroke-width: 4; stroke-dasharray: 8 8; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="800" height="450" />

  <g transform="translate(110, 85)">
    <!-- LOGO ICON (ISOTYPE) -->
    <g transform="translate(0, 0)">
      <!-- Outer Roof Structure (Navy) -->
      <path class="navy-stroke" d="M 40,140 L 140,40 L 240,140" />
      <path class="navy-stroke" d="M 70,110 L 70,220 L 210,220 L 210,110" />

      <!-- Network Connections & Circuit Lines (Cyan) -->
      <!-- Right Roof Tech Extension -->
      <path class="cyan-stroke" d="M 140,40 L 180,0 L 230,0" />
      <circle class="cyan-fill" cx="230" cy="0" r="8" />

      <!-- Internal Network Nodes (The "Smart House" Mesh) -->
      <line class="cyan-stroke" x1="140" y1="40" x2="140" y2="100" />
      <line class="cyan-stroke" x1="140" y1="100" x2="90" y2="150" />
      <line class="cyan-stroke" x1="140" y1="100" x2="190" y2="150" />
      <line class="cyan-stroke" x1="90" y1="150" x2="190" y2="150" />
      <line class="cyan-stroke" x1="140" y1="100" x2="140" y2="220" />

      <!-- Network Nodes (Dots) -->
      <circle class="navy-fill" cx="140" cy="40" r="10" />
      <circle class="cyan-fill" cx="140" cy="100" r="9" />
      <circle class="cyan-fill" cx="90" cy="150" r="8" />
      <circle class="cyan-fill" cx="190" cy="150" r="8" />
      <circle class="navy-fill" cx="140" cy="220" r="9" />
      <circle class="navy-fill" cx="70" cy="220" r="8" />
      <circle class="navy-fill" cx="210" cy="220" r="8" />
    </g>

    <!-- LOGO TEXT (TYPOGRAPHY) -->
    <g transform="translate(290, 125)">
      <!-- Main Brand Name -->
      <text x="0" y="0">
        <tspan class="text-cam">Cam</tspan>
        <tspan class="text-inmo">Inmo</tspan>
      </text>
      
      <!-- Subtitle / Tagline -->
      <text x="5" y="42" class="text-sub">RED INMOBILIARIA</text>

      <!-- Tech Accent Line Below Text -->
      <line x1="5" y1="62" x2="310" y2="62" stroke="#0F172A" stroke-width="4" stroke-linecap="round" />
      <circle class="cyan-fill" cx="325" cy="62" r="5" />
    </g>
  </g>
</svg>
